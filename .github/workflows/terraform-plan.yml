name: Terraform Plan & Apply

on:
  push:
    branches:
      - 'feature/**'

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        id: init
        run: terraform init 2>&1 | tee /tmp/tf_init.log
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color 2>&1 | tee /tmp/tf_validate.log
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.log
        continue-on-error: true

      - name: Upload Plan Artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

      - name: Upload Error Logs
        if: >
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: tf-error-logs
          path: /tmp/tf_*.log

      # ✅ Copilot steps come BEFORE the hard exit so they actually run
      - name: Install GitHub Copilot CLI
        if: >
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        working-directory: /tmp        # avoids ./terraform default dir
        run: curl -fsSL https://gh.io/copilot-install | bash

      - name: Authenticate Copilot CLI
        if: >
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        run: echo "COPILOT_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Evaluate Terraform logs with Copilot
        if: >
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        working-directory: /tmp        # log files are in /tmp, not ./terraform
        run: |
          LOG=$(cat /tmp/tf_init.log /tmp/tf_validate.log /tmp/tf_plan.log 2>/dev/null)
          copilot --autopilot --prompt "Analyze these Terraform CI pipeline logs. \
          Identify all errors and their root causes. \
          Provide the exact fix needed in the Terraform code. \
          Explain what each fix does and why.

          Logs:
          $LOG"

      # ✅ Hard fail comes LAST, after Copilot has had a chance to run
      - name: Fail Pipeline if Any Step Failed
        if: >
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        run: exit 1