name: Terraform Plan & Apply

on:
  push:
    branches:
      - 'feature/**'

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        id: init
        run: terraform init 2>&1 | tee /tmp/tf_init.log
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color 2>&1 | tee /tmp/tf_validate.log
        #continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.log
        #continue-on-error: true

      - name: Upload Terraform Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tf-logs
          path: /tmp/tf_*.log

      # ✅ Replaces the manual curl install step entirely
      - name: Setup Copilot CLI
        if: always()
        uses: actions/setup-copilot@v0

      # ── Non-interactive login — all three methods applied together ────
      - name: Login to GitHub Copilot CLI (non-interactive)
        if: always()
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "════════════════════════════════════════"
          echo "   🔐 GitHub Copilot CLI — Login Check"
          echo "════════════════════════════════════════"

          # Method 1: gh auth login --with-token (reads PAT from stdin, no browser, no prompt)
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          if [ $? -eq 0 ]; then
            echo "✅ gh auth login complete"
          else
            echo "❌ gh auth login failed"
          fi
      - name: Evaluate Terraform logs with Copilot
        if: always()
        run: |
          LOG="$(cat /tmp/tf_init.log /tmp/tf_validate.log /tmp/tf_plan.log 2>/dev/null || true)"

          echo "──────────────────────────────────────────"
          echo "🤖 GitHub Copilot CLI — Terraform Analysis"
          echo "──────────────────────────────────────────"

          COPILOT_OUTPUT=$(copilot \
            --no-ask-user \
            --allow-all-tools \
            -p "You are a Terraform and GitHub Actions expert.
          Analyze the following Terraform CI pipeline logs.
          1. List every error found.
          2. Explain the root cause of each error.
          3. Provide the exact Terraform code fix.
          Output plain text only. Be concise.

          Logs:
          $LOG" 2>&1 | tee /dev/stderr)

          # Write to GitHub Actions Step Summary
          echo "## 🤖 Copilot Terraform Analysis" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$COPILOT_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
