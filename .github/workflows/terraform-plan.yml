name: Terraform Plan & Apply

on:
  push:
    branches:
      - 'feature/**'

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        id: init
        run: terraform init 2>&1 | tee /tmp/tf_init.log
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color 2>&1 | tee /tmp/tf_validate.log
        #continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.log
        #continue-on-error: true

      - name: Upload Error Logs
        uses: actions/upload-artifact@v4
        with:
          name: tf-error-logs
          path: /tmp/tf_*.log

      - name: Install GitHub Copilot CLI
        if: always()
        run: curl -fsSL https://gh.io/copilot-install | bash

      - name: Authenticate Copilot CLI
        if: always()
        run: echo "COPILOT_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Run Copilot CLI
        if: always()
        run: copilot --version
      
      - name: Verify Copilot auth
        if: always()
        run: |
          copilot version
          echo "COPILOT_GITHUB_TOKEN set: $([ -n "$COPILOT_GITHUB_TOKEN" ] && echo yes || echo no)"
          test -s /tmp/tf_validate.log && echo "validate log exists"
          test -s /tmp/tf_plan.log && echo "plan log exists"

      - name: Evaluate Terraform logs with Copilot
        if: always()
        working-directory: /tmp
        run: |
          echo "Reading logs from /tmp/tf_validate.log and /tmp/tf_plan.log"
          LOG="$(cat /tmp/tf_validate.log /tmp/tf_plan.log 2>/dev/null || true)"
          printf '%s\n' "$LOG" | head -n 40
          copilot \
            --prompt "Analyze these Terraform CI logs. Identify the errors, root cause, and exact fix. Output plain text only.

          Logs:
          $LOG" \
                --no-ask-user \
                --silent