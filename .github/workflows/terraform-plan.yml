name: Terraform Plan & Apply

on:
  push:
    branches:
      - 'feature/**'        # triggers on any feature/* branch

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # required for OIDC
      contents: read
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        id: init
        run: terraform init 2>&1 | tee /tmp/tf_init.log

      - name: Terraform Validate
        id: validate
        run: terraform validate 2>&1 | tee /tmp/tf_validate.log

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.log

      - name: Upload Plan Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

      # Runs ONLY when any step above fails
      - name: Setup GitHub Copilot
        if: failure()
        uses: actions/setup-copilot@v0
        with:
          version: "latest"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copilot — Analyze Terraform Error
        if: failure()
        run: |
          # Collect only the error output from whichever terraform step failed
          ERROR_LOG=$(cat /tmp/tf_init.log /tmp/tf_validate.log /tmp/tf_plan.log 2>/dev/null | grep -E "Error:|error:|╷|│|╵" | tail -50)

          echo "### Terraform Error Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$ERROR_LOG" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          copilot chat \
            --model gpt-4o \
            --prompt "You are a senior DevOps engineer. I will give you ONLY the error output from a Terraform pipeline. 
            Do NOT evaluate anything other than the error block below.
            From this error:
            1. Explain in 2-3 sentences WHY this error occurred.
            2. Provide EXACTLY 2 solutions following industry best practices.
            Format your response as:
            ## Why It Occurred
            <explanation>
            ## Solution 1 (Best Practice)
            <solution>
            ## Solution 2 (Alternative Best Practice)
            <solution>
            Here is the Terraform error output:
            $ERROR_LOG" >> $GITHUB_STEP_SUMMARY

  approval:
    name: Awaiting Manual Approval
    runs-on: ubuntu-latest
    needs: terraform-plan        # runs only after plan succeeds
    environment: production      # pauses here for manual approval

    steps:
      - name: Approval Granted
        run: echo "Approved. Proceeding to Terraform Apply..."

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: approval              # runs only after approval
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan 2>&1 | tee /tmp/tf_apply.log

      # Runs ONLY when apply fails
      - name: Setup GitHub Copilot
        if: failure()
        uses: actions/setup-copilot@v0
        with:
          version: "latest"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copilot — Analyze Terraform Apply Error
        if: failure()
        run: |
          ERROR_LOG=$(cat /tmp/tf_apply.log 2>/dev/null | grep -E "Error:|error:|╷|│|╵" | tail -50)

          echo "### Terraform Apply Error Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$ERROR_LOG" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          copilot chat \
            --model gpt-4o \
            --prompt "You are a senior DevOps engineer. I will give you ONLY the error output from a Terraform pipeline. 
            Do NOT evaluate anything other than the error block below.
            From this error:
            1. Explain in 2-3 sentences WHY this error occurred.
            2. Provide EXACTLY 2 solutions following industry best practices.
            Format your response as:
            ## Why It Occurred
            <explanation>
            ## Solution 1 (Best Practice)
            <solution>
            ## Solution 2 (Alternative Best Practice)
            <solution>
            Here is the Terraform error output:
            $ERROR_LOG" >> $GITHUB_STEP_SUMMARY
