name: Terraform Plan & Apply

on:
  push:
    branches:
      - 'feature/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # suppress Node.js 20 deprecation warnings

jobs:
  terraform-plan:
    name: terraform-plan.yml
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}  # ✅ required for Copilot CLI auth
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}  # fallback if var unset
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4 Node 24 compatible

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096a43de70f54d9e0ff5  # v4 Node 24 compatible
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            2>&1 | tee /tmp/tf_init.log
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color 2>&1 | tee /tmp/tf_validate.log
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.log
        continue-on-error: true

      - name: Upload Terraform Logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4 Node 24 compatible
        with:
          name: tf-logs
          path: /tmp/tf_*.log

      - name: Setup Copilot CLI
        if: always()
        uses: actions/setup-copilot@v0

      - name: IaC Code Analysis via Copilot
        if: always()
        run: |
          echo "   🤖 GitHub Copilot CLI — Terraform Analysis"
          echo "════════════════════════════════════════"

          cat /tmp/tf_validate.log /tmp/tf_plan.log > /tmp/copilot_logs.txt 2>/dev/null || true

          LOG_CONTENT="$(cat /tmp/copilot_logs.txt 2>/dev/null || echo '')"

          if [ -z "$LOG_CONTENT" ]; then
            echo "⚠️  No Terraform logs found — skipping Copilot analysis."
            echo "## 🤖 Copilot Terraform Analysis" >> "$GITHUB_STEP_SUMMARY"
            echo "> ⚠️ No logs available. Terraform steps likely failed before producing output (e.g. missing AWS credentials or backend config)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "⏳ Running Copilot analysis... please wait"
          echo "────────────────────────────────────────"

          copilot \
            --model=gpt-4.1 \
            --no-color \
            --silent \
            --allow-all-tools \
            -p "You are a Terraform expert.
          Analyze these Terraform CI logs:

          $LOG_CONTENT

          1. List every error found.
          2. Explain the root cause of each error in one line only.
          3. Provide just the terraform code fix.
          Output plain text only. Be concise." 2>&1 | tee /tmp/copilot_output.txt

          echo "📊 Output size: $(wc -l < /tmp/copilot_output.txt) lines"
          echo "════════════════════════════════════════"
          echo "## 🤖 Copilot Terraform Analysis" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/copilot_output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # ✅ Hard fail LAST — after Copilot has run
      - name: Fail if Terraform errored
        if: >
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        run: exit 1
