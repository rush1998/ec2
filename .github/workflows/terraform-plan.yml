name: Terraform Plan & Apply

on:
  push:
    branches:
      - 'feature/**'

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # ✅ required for gh auth status and gh CLI commands
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        id: init
        run: terraform init 2>&1 | tee /tmp/tf_init.log
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color 2>&1 | tee /tmp/tf_validate.log
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.log
        continue-on-error: true

      - name: Upload Terraform Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tf-logs
          path: /tmp/tf_*.log

      - name: Setup Copilot CLI
        if: always()
        uses: actions/setup-copilot@v0

      - name: Copilot Terraform Analysis
        if: always()
        run: | 
          pwd
          echo "════════════════════════════════════════"
          echo "   🤖 GitHub Copilot CLI — Terraform Analysis"
          echo "════════════════════════════════════════"

          cat /tmp/tf_validate.log /tmp/tf_plan.log > /tmp/copolit_logs.log

          echo "⏳ Running Copilot analysis... please wait"
          echo "────────────────────────────────────────"
          pwd
          copilot \
            --banner \
            --no-ask-user \
            --allow-all \
            --config-dir=/tmp \
            -p "You are a Terraform expert.
          Read the file copolit_logs.log.
          1. List every error found.
          2. Explain the root cause of each error.
          3. Provide the exact Terraform code fix.
          Output plain text only. Be concise." 2>&1 | tee /tmp/copilot_output.txt

          echo "────────────────────────────────────────"
          echo "📄 Copilot output:"
          echo "────────────────────────────────────────"
          cat /tmp/copilot_output.txt
          echo "────────────────────────────────────────"
          echo "📊 Output size: $(wc -l < /tmp/copilot_output.txt) lines"
          echo "✅ Copilot analysis complete"
          echo "════════════════════════════════════════"

      # ✅ Hard fail LAST — after Copilot has run
      - name: Fail if Terraform errored
        if: >
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        run: exit 1
