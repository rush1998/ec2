name: Terraform Plan & Apply

on:
  push:
    branches:
      - 'feature/**'

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        id: init
        run: terraform init 2>&1 | tee /tmp/tf_init.log
        continue-on-error: true

      # ✅ continue-on-error required so Copilot steps always run
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color 2>&1 | tee /tmp/tf_validate.log
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.log
        continue-on-error: true

      - name: Upload Terraform Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tf-logs
          path: /tmp/tf_*.log

      # ✅ COPILOT_TOKEN must be a fine-grained PAT with GitHub Copilot Chat permission
      # secrets.GITHUB_TOKEN (ghs_) does NOT have Copilot API access
      - name: Setup Copilot CLI
        if: always()
        uses: actions/setup-copilot@v0
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}

      - name: Login to GitHub Copilot CLI (non-interactive)
        if: always()
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          echo "════════════════════════════════════════"
          echo "   🔐 GitHub Copilot CLI — Auth Check"
          echo "════════════════════════════════════════"

          # ✅ No gh auth login — env var is all Copilot needs
          echo "Token present : $([ -n "$COPILOT_GITHUB_TOKEN" ] && echo ✅ SET || echo ❌ NOT SET — add COPILOT_TOKEN secret)"
          echo "Token prefix  : $(echo "$COPILOT_GITHUB_TOKEN" | cut -c1-12)..."
          echo "Token type    : $(echo "$COPILOT_GITHUB_TOKEN" | grep -q '^github_pat_' \
            && echo '✅ Fine-grained PAT — Copilot API access OK' \
            || echo '❌ NOT a fine-grained PAT — create one at github.com/settings/tokens')"
          copilot version
          echo "════════════════════════════════════════"

          echo "════════════════════════════════════════"
          echo "   📋 Checking Terraform Log Files"
          echo "════════════════════════════════════════"

          VALIDATE_OK=false
          PLAN_OK=false

          if [ -s /tmp/tf_validate.log ]; then
            echo "✅ tf_validate.log exists ($(wc -l < /tmp/tf_validate.log) lines)"
            echo "── Contents ──────────────────────────────"
            cat /tmp/tf_validate.log
            VALIDATE_OK=true
          else
            echo "❌ tf_validate.log is missing or empty"
          fi

          echo "──────────────────────────────────────────"

          if [ -s /tmp/tf_plan.log ]; then
            echo "✅ tf_plan.log exists ($(wc -l < /tmp/tf_plan.log) lines)"
            echo "── Contents ──────────────────────────────"
            cat /tmp/tf_plan.log
            PLAN_OK=true
          else
            echo "❌ tf_plan.log is missing or empty"
          fi

          echo "════════════════════════════════════════"
          echo "   🤖 GitHub Copilot CLI — Terraform Analysis"
          echo "════════════════════════════════════════"
          echo ""
          echo "📂 Log files passed to Copilot:"
          echo "   → /tmp/tf_validate.log"
          echo "   → /tmp/tf_plan.log"
          echo ""
          echo "⏳ Running Copilot analysis... please wait"
          echo "────────────────────────────────────────"

          if [ "$VALIDATE_OK" = true ] && [ "$PLAN_OK" = true ]; then
            echo "✅ Both logs present — passing both to Copilot"
            LOG="$(cat /tmp/tf_validate.log /tmp/tf_plan.log)"
          elif [ "$VALIDATE_OK" = true ] && [ "$PLAN_OK" = false ]; then
            echo "⚠️  Only validate log found — passing validate only"
            LOG="$(cat /tmp/tf_validate.log)"
          elif [ "$VALIDATE_OK" = false ] && [ "$PLAN_OK" = true ]; then
            echo "⚠️  Only plan log found — passing plan only"
            LOG="$(cat /tmp/tf_plan.log)"
          else
            echo "❌ Both logs missing or empty — skipping Copilot analysis"
            exit 1
          fi

          copilot \
            --add-dir=/tmp \
            --no-ask-user \
            --allow-all-tools \
            --allow-all-paths \
            -p "You are a Terraform expert.
          Analyze these Terraform CI logs.
          1. List every error found.
          2. Explain the root cause of each error.
          3. Provide the exact Terraform code fix.
          Output plain text only. Be concise.

          Logs:
          $LOG" 2>&1 | tee /tmp/copilot_output.txt

          echo "────────────────────────────────────────"
          echo ""
          echo "📄 Copilot raw output saved to: /tmp/copilot_output.txt"
          echo "📊 Output size: $(wc -l < /tmp/copilot_output.txt) lines"
          echo ""
          echo "✅ Copilot analysis complete"
          echo "════════════════════════════════════════"

          echo "## 🤖 Copilot Terraform Analysis" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/copilot_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Copilot Analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-analysis
          path: /tmp/copilot_output.txt

      # ✅ Hard fail LAST — after Copilot has run
      - name: Fail if Terraform errored
        if: >
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        run: exit 1
