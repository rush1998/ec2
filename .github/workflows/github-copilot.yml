name: github-copilot-cli

on:
  push:
    branches:
      - 'feature/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}

jobs:
  terraform-initplan:
    name: terraform-initplan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            2>&1 | tee /tmp/tf_init.log
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color 2>&1 | tee /tmp/tf_validate.log
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.log
        continue-on-error: true

      - name: Upload Terraform Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tf-logs
          path: /tmp/tf_*.log

      - name: Setup Copilot CLI
        if: always()
        uses: actions/setup-copilot@v0
        with:
          version: latest
      - run: |
          echo "   🤖 GitHub Copilot CLI — Terraform Analysis"
          echo "════════════════════════════════════════"

          cat /tmp/tf_validate.log /tmp/tf_plan.log > /tmp/copilot_logs.txt 2>/dev/null || true

          LOG_CONTENT="$(cat /tmp/copilot_logs.txt 2>/dev/null || echo '')"

          if [ -z "$LOG_CONTENT" ]; then
            echo "⚠️  No Terraform logs found — skipping Copilot analysis."
            echo "## 🤖 Copilot Terraform Analysis" >> "$GITHUB_STEP_SUMMARY"
            echo "> ⚠️ No logs available. Check that AWS credentials and backend secrets are set correctly." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "⏳ Running Copilot analysis... please wait"
          echo "────────────────────────────────────────"

          copilot \
            --model=gpt-4.1 \
            --no-color \
            --silent \
            --allow-all-tools \
            -p "You are a Terraform expert.
          Analyze these Terraform CI logs:

          $LOG_CONTENT

          1. List every error found.
          2. Explain the root cause of each error in one line only.
          3. Provide just the terraform code fix.
          Output plain text only. Be concise." 2>&1 | tee /tmp/copilot_output.txt

          echo "📊 Output size: $(wc -l < /tmp/copilot_output.txt) lines"
          echo "════════════════════════════════════════"
          echo "## 🤖 Copilot Terraform Analysis" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/copilot_output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # ✅ Hard fail LAST — after Copilot has run
      - name: Fail if Terraform errored
        if: >
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        run: exit 1

      - name: Fix the pipeline and push the code 
        if: always()
        uses: actions/setup-copilot@v0
        with:
          version: latest
      - run: |
          copilot \
            --model=gpt-4.1 \
            --allow-all-tools \
            --deny-tool='shell(rm)' \
            --deny-tool='shell(git merge)' \
            -p "you need to fix the code and push it to the repo.
          Steps to follow the fix is as follows:
            1. create a branch name copilot-fix-${GITHUB_RUN_ID}
            2. fix the code based on the previous analysis and output, and make sure the pipeline will pass after the fix.
            3. commit the code change with message '$GITHUB_STEP_SUMMARY'
            4. push the code to copilot-fix-${GITHUB_RUN_ID}
            5. create a PR from copilot-fix-${GITHUB_RUN_ID} to ${GITHUB_REF_NAME} with title 'Copilot fix: $GITHUB_STEP_SUMMARY' and body 'This PR includes the code changes to fix the Terraform errors found in the previous analysis.'
            6. if any merger conflicts happen, fix the conflicts and push the code again until the PR is created successfully.
