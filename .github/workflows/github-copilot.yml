name: github-copilot-cli

on:
  push:
    branches:
      - 'main'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}

jobs:
  terraform-initplan:
    name: terraform-initplan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # - name: Terraform Init
      #   id: init
      #   run: |
      #     terraform init \
      #       -reconfigure \
      #       -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
      #       -backend-config="key=${{ env.TF_STATE_KEY }}" \
      #       -backend-config="region=${{ env.AWS_REGION }}" \
      #       -backend-config="encrypt=true" \
      #       2>&1 | tee /tmp/tf_init.log
      #   continue-on-error: true

      # - name: Terraform Validate
      #   id: validate
      #   run: terraform validate -no-color 2>&1 | tee /tmp/tf_validate.log
      #   continue-on-error: true

      # - name: Terraform Plan
      #   id: plan
      #   run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.log
      #   continue-on-error: true

      # - name: Upload Terraform Logs
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: tf-logs
      #     path: /tmp/tf_*.log

      - name: Setup Copilot CLI
        if: always()
        uses: actions/setup-copilot@v0
        with:
          version: latest
      - run: |
          echo "## 🧑‍💻 Copilot is running ##"
          BRANCH="copilot-fix-${{ github.run_id }}"
          SUMMARY="Fix Terraform error"
          PROMPT=$(cat <<EOF
          You are a Terraform expert working in this checked-out repository.
          You are also a GitHub expert. Resolve any GitHub error safely (including merge conflicts, branch history issues, and PR creation errors) and continue until push and PR creation succeed.

          Execute these Terraform commands in the current working directory and use their output:
          terraform init -reconfigure -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" -backend-config="key=${{ env.TF_STATE_KEY }}" -backend-config="region=${{ env.AWS_REGION }}" -backend-config="encrypt=true"
          terraform validate -no-color
          terraform plan -no-color -out=tfplan

          Then do the following:
          1. List every error found.
          2. Explain the root cause of each error in one line only.
          3. Apply only the necessary Terraform code changes to fix the errors.
          4. Re-run validate and plan to confirm the fix.
          5. Create branch $BRANCH.
          6. Commit with message: $SUMMARY
          7. Push to branch $BRANCH.
          8. Create a PR from $BRANCH to ${{ github.ref_name }} titled: Copilot fix: $SUMMARY and body: Fixes Terraform errors.
          9. Do not merge the PR.

          Output plain text only. Be concise.
          EOF
          )

          copilot \
            --model=gpt-4.1 \
            --deny-tool='shell(rm)' \
            --deny-tool='shell(gh pr merge)' \
            --allow-all-tools \
            -p "$PROMPT" >/tmp/copilot_output.txt 2>&1

          echo "🤖 Copilot Terraform Analysis" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/copilot_output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          
      # - name: Fail if Terraform errored
      #   if: >
      #     steps.init.outcome == 'failure' ||
      #     steps.validate.outcome == 'failure' ||
      #     steps.plan.outcome == 'failure'
      #   run: exit 1

      